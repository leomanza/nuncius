  <path d="M14 38 q8 -2 16 2" stroke-opacity="0.55" />
  <!-- text lines on right page -->
  <path d="M50 26 q-8 -2 -16 2" stroke-opacity="0.55" />
  <path d="M50 32 q-8 -2 -16 2" stroke-opacity="0.55" />
  <path d="M50 38 q-8 -2 -16 2" stroke-opacity="0.55" />
  <!-- quill (top right) -->
  <path d="M52 8 L40 22" />
