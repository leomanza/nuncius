<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Astronaut helmet against a crescent moon -->
  <!-- crescent (background) -->
  <path d="M50 14 a18 18 0 1 0 0 28 a14 14 0 1 1 0 -28 z" fill="currentColor" fill-opacity="0.18" stroke-opacity="0.5" />
  <!-- helmet outer ring -->
  <circle cx="26" cy="34" r="14" />
  <!-- helmet visor (curved rectangle) -->
  <path d="M16 28 q10 -4 20 0 q-1 8 0 12 q-10 4 -20 0 q1 -6 0 -12 z" fill="currentColor" fill-opacity="0.25" stroke-opacity="0.85" />
  <!-- visor reflection highlight -->
  <path d="M19 30 q4 -1 7 0" stroke-opacity="0.6" />
  <!-- helmet collar -->
  <path d="M14 46 q12 4 24 0" stroke-opacity="0.7" />
  <!-- antenna / receiver dot -->
  <circle cx="26" cy="20" r="1" fill="currentColor" />
  <path d="M26 21 L26 24" stroke-opacity="0.6" />
</svg>
